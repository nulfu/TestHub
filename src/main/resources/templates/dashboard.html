<h1>Dashboard</h1>

<div>
    <h3>Progress</h3>
    <p>Total: <span th:text="${dashboard.progress.totalCases}"></span></p>
    <p>Completed: <span th:text="${dashboard.progress.completedCases}"></span></p>
    <p>Remaining: <span th:text="${dashboard.progress.remainingCases}"></span></p>
</div>

<div th:style="'width:' + ${dashboard.progress.percentage} + '%;background:blue;height:20px;color:white;text-align:center;'">
    <span th:text="${dashboard.progress.percentage} + '%'"></span>
</div>

<h3>Result Summary</h3>
<p style="color:green;">PASS: <span th:text="${dashboard.passCount}"></span></p>
<p style="color:red;">FAIL: <span th:text="${dashboard.failCount}"></span></p>

<h3>Details</h3>
<table border="1">
<tr>
    <th>VersionId</th>
    <th>Result</th>
</tr>

<tr th:each="c : ${dashboard.cases}">
    <td th:text="${c.versionId}"></td>
    <td th:text="${c.result}" th:style="'color:' + ${c.color}"></td>
</tr>
</table>

<br>
<a th:href="@{/ui/test-execution(releaseId=${dashboard.releaseId})}">
    → テスト実行
</a>
