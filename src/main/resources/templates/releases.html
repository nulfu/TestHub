<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    
<head>
    <title>Releases</title>
</head>

<body>

<h1>Releases</h1>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Action</th>
    </tr>

    <tr th:each="r : ${releases}">
        <td th:text="${r.name}">Release Name</td>

        <td>
            <a th:href="@{/ui/dashboard(releaseId=${r.releaseId})}">
                Dashboard
            </a>

            |
            
            <a th:href="@{/ui/test-execution(releaseId=${r.releaseId})}">
                Execute
            </a>
        </td>
    </tr>

</table>

</body>
</html>
